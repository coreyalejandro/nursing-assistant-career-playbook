# Cloudflare Pages configuration.
# - pages_build_output_dir: Vite emits the static SPA here.
# - nodejs_compat: lets the Pages Functions in /functions use Node-style APIs
#   (process.env bridge, etc.). Required for the shared server/handlers.
# Secrets (OPENROUTER_API_KEY, optional ADZUNA_*, SUPABASE_SERVICE_ROLE_KEY) and
# the public build vars (VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY) are set in
# the Cloudflare dashboard → Settings → Environment variables (NOT committed).
name = "nursing-assistant-career-playbook"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# Distributed rate limiting + freemium daily quota (server/kvLimiter,
# server/freemium). The Functions enforce the 10/day free AI quota and per-IP
# rate limit ONLY when this KV namespace is bound; without it they degrade
# gracefully (no edge enforcement). To ACTIVATE on the live site:
#   1) Create the namespace (needs a token with "Workers KV Storage: Edit", or
#      the dashboard → Workers & Pages → KV → Create namespace "RATE_LIMIT_KV").
#        npx wrangler kv namespace create RATE_LIMIT_KV
#   2) Uncomment the block below and paste the returned id, then redeploy
#      (or add the binding in the Pages project → Settings → Bindings).
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "PASTE_KV_NAMESPACE_ID_HERE"
