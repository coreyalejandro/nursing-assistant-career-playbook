# Cloudflare Pages configuration.
# - pages_build_output_dir: Vite emits the static SPA here.
# - nodejs_compat: lets the Pages Functions in /functions use Node-style APIs
#   (process.env bridge, etc.). Required for the shared server/handlers.
# Secrets (OPENROUTER_API_KEY, optional ADZUNA_*, SUPABASE_SERVICE_ROLE_KEY) and
# the public build vars (VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY) are set in
# the Cloudflare dashboard → Settings → Environment variables (NOT committed).
name = "nursing-assistant-career-playbook"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# Distributed rate limiting + freemium daily quota (server/kvLimiter,
# server/freemium). The Functions enforce the 10/day free AI quota and per-IP
# rate limit ONLY when this KV namespace is bound. Declaring it here ensures
# `wrangler pages deploy` attaches the binding to the deployment itself (a
# project-level binding alone is not reliably inherited by wrangler deploys).
# ACTIVATED 2026-06-17: namespace "RATE_LIMIT_KV" created and bound.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "f23dc0b9176b44fbb76fc07a062073e5"
