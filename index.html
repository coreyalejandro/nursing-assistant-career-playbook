<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="The Certified Nursing Assistant (CNA) Career Playbook — a trauma-informed career companion for Certified Nursing Assistants: state certification guidance, resume tailoring, mock interviews, live wage data, and burnout support."
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Certified Nursing Assistant (CNA) Career Playbook</title>
    <style>
      #app-skeleton{position:fixed;inset:0;display:flex;flex-direction:column;background:#efedea;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
      #app-skeleton .bar{height:56px;background:#0f172a;display:flex;align-items:center;padding:0 16px;gap:8px}
      #app-skeleton .dot{width:18px;height:18px;border-radius:50%;background:#f59e0b;flex:none}
      #app-skeleton .brand{color:#fff;font-weight:800;font-size:11px;letter-spacing:.12em;text-transform:uppercase}
      #app-skeleton .body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
      #app-skeleton .spin{width:34px;height:34px;border:3px solid #d6d3cd;border-top-color:#f59e0b;border-radius:50%;animation:cna-spin .8s linear infinite}
      #app-skeleton .lbl{font-size:12px;color:#64748b;font-weight:600}
      @keyframes cna-spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-skeleton" aria-hidden="true">
        <div class="bar"><span class="dot"></span><span class="brand">Certified Nursing Assistant (CNA) Career Playbook</span></div>
        <div class="body"><div class="spin"></div><div class="lbl">Loading…</div></div>
      </div>
    </div>
    <noscript>
      This application requires JavaScript. The Certified Nursing Assistant (CNA)
      Career Playbook helps CNAs with certification, resumes, interviews, and wages.
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
