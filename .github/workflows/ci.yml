name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # typecheck + lint + unit (incl. axe a11y, KV, freemium) + integration +
  # security probe + HIPAA wiring + backup, then a dependency-vulnerability scan.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:ci
      - name: Dependency vulnerability scan (npm audit)
        run: npm audit --omit=dev --audit-level=high

  # End-to-end: chat safety boundary, freemium 402 paywall, PWA/offline.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Lighthouse on the built static app: LCP / CLS / accessibility budgets.
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx --yes @lhci/cli@0.14.x autorun
